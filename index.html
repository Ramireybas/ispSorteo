<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Sorteo</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-glow"></div>

    <!-- DECORACIONES -->

    <img src="assets/estadio.png" class="stadium-bg" alt="Estadio">

    <img src="assets/frente.png" class="frente" alt="Copa Mundial">



    <img src="assets/dorso.png" class="dorso" alt="TV 50 pulgadas">


    <main class="container">

        <img src="assets/logo.png" alt="Logo Empresa" class="logo">

        <div class="title-box">
            <span class="mini-title">SORTEO ESPECIAL</span>
        <h1>
    <span class="title-white">ALENTA A LA </span>
    <span class="title-green">SELECCION!!</span>
</h1>

<p>
  
    <span class="participa">Participa por una camiseta de ISP.</span>
</p>
        </div>


        <div class="card">

            <label for="csvFile" class="upload-label">
                PARTICIPANTES
            </label>

            <input type="file" id="csvFile" accept=".csv">

            <div class="info">
               Numero de participantes :
                <span id="participantsCount">0</span>
            </div>

            <button id="drawButton" disabled>
                REALIZAR SORTEO
            </button>

        </div>


        <section class="winner-section hidden" id="winnerSection">

            <h2>NÚMERO GANADOR</h2>

            <div id="winnerNumber" class="winner-number">
                000000
            </div>

            <div id="dateTime" class="date-time"></div>

        </section>
   



</section>

<footer class="footer">

    <p>¡SEGUINOS EN NUESTRAS REDES!</p>

    <div class="socials">
        <span><img src="assets/instagram.png" alt="Instagram"></span>
        <span><img src="assets/facebook.png" alt="Facebook"></span>
        <span><img src="assets/whatsapp.png" alt="WhatsApp"></span>
    </div>

</footer>
    </main>

    <audio id="winSound" src="sounds/win.mp3"></audio>

    <script src="script.js"></script>

</body>

</html>
